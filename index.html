<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KPI Call Center - Advanced Analytics 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card:hover { transform: translateY(-8px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
        .glass { background: rgba(255, 255, 255, 0.97); backdrop-filter: blur(12px); }
        th { cursor: pointer; }
        .modal { animation: modalPop 0.3s ease; }
        @keyframes modalPop { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="bg-gray-950 text-gray-100">

<div class="flex h-screen overflow-hidden">
    <!-- SIDEBAR -->
    <div class="w-72 bg-gray-900 border-r border-gray-800 flex flex-col">
        <div class="p-8 border-b border-gray-800">
            <h1 class="text-3xl font-bold bg-gradient-to-r from-indigo-400 to-purple-500 bg-clip-text text-transparent">
                <i class="fas fa-headset"></i> CALLKPI
            </h1>
            <p class="text-gray-500 text-sm mt-1">Advanced Analytics • 2026</p>
        </div>
        
        <nav class="flex-1 p-6 space-y-2">
            <button onclick="showTab(0)" class="tab-btn w-full flex items-center gap-3 px-5 py-4 rounded-2xl bg-indigo-600 text-white font-medium">
                <i class="fas fa-tachometer-alt"></i> Dashboard General
            </button>
            <button onclick="showTab(1)" class="tab-btn w-full flex items-center gap-3 px-5 py-4 rounded-2xl hover:bg-gray-800 text-gray-300 font-medium">
                <i class="fas fa-users"></i> Ranking Asesores
            </button>
            <button onclick="showTab(2)" class="tab-btn w-full flex items-center gap-3 px-5 py-4 rounded-2xl hover:bg-gray-800 text-gray-300 font-medium">
                <i class="fas fa-chart-line"></i> Análisis Temporal
            </button>
            <button onclick="showTab(3)" class="tab-btn w-full flex items-center gap-3 px-5 py-4 rounded-2xl hover:bg-gray-800 text-gray-300 font-medium">
                <i class="fas fa-user-tie"></i> Perfil Individual
            </button>
        </nav>

        <div class="p-6 border-t border-gray-800">
            <button onclick="toggleDarkMode()" class="w-full py-3 bg-gray-800 hover:bg-gray-700 rounded-2xl flex items-center justify-center gap-2">
                <i class="fas fa-moon"></i> Cambiar Tema
            </button>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="flex-1 overflow-auto">
        <!-- HEADER -->
        <header class="bg-gray-900 border-b border-gray-800 px-10 py-6 flex items-center justify-between sticky top-0 z-50">
            <div class="flex items-center gap-4">
                <h2 id="pageTitle" class="text-3xl font-semibold">Dashboard General</h2>
                <span class="px-4 py-1.5 bg-emerald-500/10 text-emerald-400 text-sm rounded-3xl">Ene - Abr 2026</span>
            </div>
            
            <div class="flex items-center gap-4">
                <label class="cursor-pointer bg-white text-gray-900 px-6 py-3 rounded-2xl font-medium flex items-center gap-3 hover:bg-gray-100">
                    <i class="fas fa-upload"></i>
                    <span>Subir CSV / Excel</span>
                    <input type="file" id="csvUpload" accept=".csv" class="hidden" onchange="handleFileUpload(event)">
                </label>
                <button onclick="exportAll()" class="px-6 py-3 border border-gray-700 hover:border-gray-500 rounded-2xl flex items-center gap-2">
                    <i class="fas fa-download"></i> Exportar Todo
                </button>
            </div>
        </header>

        <div class="p-10">

            <!-- TAB 0: GENERAL -->
            <div id="tab0" class="tab">
                <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6 mb-10">
                    <!-- KPI Cards -->
                    <div id="kpi1" class="card bg-gray-900 border border-gray-800 rounded-3xl p-6"></div>
                    <div id="kpi2" class="card bg-gray-900 border border-gray-800 rounded-3xl p-6"></div>
                    <div id="kpi3" class="card bg-gray-900 border border-gray-800 rounded-3xl p-6"></div>
                    <div id="kpi4" class="card bg-gray-900 border border-gray-800 rounded-3xl p-6"></div>
                    <div id="kpi5" class="card bg-gray-900 border border-gray-800 rounded-3xl p-6"></div>
                    <div id="kpi6" class="card bg-gray-900 border border-gray-800 rounded-3xl p-6"></div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                    <div class="bg-gray-900 border border-gray-800 rounded-3xl p-8">
                        <h3 class="text-lg font-semibold mb-6">Evolución Mensual</h3>
                        <canvas id="monthlyChart" height="110"></canvas>
                    </div>
                    <div class="bg-gray-900 border border-gray-800 rounded-3xl p-8">
                        <h3 class="text-lg font-semibold mb-6">Distribución CSAT</h3>
                        <canvas id="distributionChart"></canvas>
                    </div>
                </div>
            </div>

            <!-- TAB 1: RANKING -->
            <div id="tab1" class="tab hidden">
                <div class="bg-gray-900 border border-gray-800 rounded-3xl overflow-hidden">
                    <div class="p-6 border-b border-gray-800 flex justify-between items-center">
                        <input id="search" type="text" placeholder="Buscar asesor..." 
                               class="bg-gray-800 border border-gray-700 rounded-2xl px-5 py-3 w-80 focus:outline-none focus:border-indigo-500"
                               onkeyup="filterTable()">
                        <button onclick="sortTable()" class="text-sm flex items-center gap-2 text-gray-400 hover:text-white">
                            <i class="fas fa-sort"></i> Ordenar por Score
                        </button>
                    </div>
                    <table id="rankingTable" class="w-full"></table>
                </div>
            </div>

            <!-- TAB 2: ANÁLISIS TEMPORAL -->
            <div id="tab2" class="tab hidden">
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <div class="lg:col-span-2 bg-gray-900 border border-gray-800 rounded-3xl p-8">
                        <h3 class="font-semibold mb-6">Tendencias por KPI</h3>
                        <canvas id="trendMultiChart" height="140"></canvas>
                    </div>
                    <div class="bg-gray-900 border border-gray-800 rounded-3xl p-8">
                        <h3 class="font-semibold mb-6">Mejores Mejoras</h3>
                        <div id="improvements"></div>
                    </div>
                </div>
            </div>

            <!-- TAB 3: PERFIL INDIVIDUAL -->
            <div id="tab3" class="tab hidden">
                <div class="flex gap-6">
                    <div class="w-80 bg-gray-900 border border-gray-800 rounded-3xl p-8" id="advisorProfile">
                        <!-- JS populated -->
                    </div>
                    <div class="flex-1 bg-gray-900 border border-gray-800 rounded-3xl p-8">
                        <canvas id="advisorRadar" height="180"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- MODAL -->
<div id="modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
    <div class="bg-gray-900 rounded-3xl max-w-2xl w-full mx-4 modal p-8">
        <h3 class="text-2xl font-bold mb-6" id="modalName"></h3>
        <div id="modalContent" class="grid grid-cols-2 gap-6"></div>
        <button onclick="closeModal()" class="mt-8 w-full py-4 bg-gray-800 hover:bg-gray-700 rounded-2xl">Cerrar</button>
    </div>
</div>

<script>
// ==================== DATOS BASE (se sobrescriben con CSV) ====================
let advisors = [
    {name:"Laura Martínez", calls:12450, csat:96.2, fcr:93.1, adherence:98.4, quality:95, avgTime:245, resolution:94},
    {name:"Carlos Rivera", calls:10890, csat:91.8, fcr:87.4, adherence:94.2, quality:89, avgTime:312, resolution:88},
    {name:"Ana López", calls:13780, csat:97.1, fcr:94.8, adherence:97.9, quality:96, avgTime:198, resolution:95},
    // ... (15 asesores generados)
];

let monthlyData = {
    calls: [28900, 31450, 30120, 34800],
    csat: [91.8, 92.4, 93.1, 94.2],
    fcr: [86.5, 87.1, 88.4, 87.9]
};

// Variables globales
let currentAdvisor = null;
let allCharts = {};

// ==================== FUNCIONES PRINCIPALES ====================
function calculateKPIs() {
    const totalCalls = advisors.reduce((a, b) => a + b.calls, 0);
    const avgCSAT = (advisors.reduce((a, b) => a + b.csat, 0) / advisors.length).toFixed(1);
    const avgFCR = (advisors.reduce((a, b) => a + b.fcr, 0) / advisors.length).toFixed(1);
    const avgAdh = (advisors.reduce((a, b) => a + b.adherence, 0) / advisors.length).toFixed(1);
    const topPerformer = advisors.reduce((a, b) => a.csat > b.csat ? a : b);

    // Render KPI Cards
    document.getElementById('kpi1').innerHTML = `<p class="text-gray-400 text-sm">Total Llamadas</p><p class="text-5xl font-bold mt-2">${totalCalls.toLocaleString()}</p>`;
    document.getElementById('kpi2').innerHTML = `<p class="text-gray-400 text-sm">CSAT Promedio</p><p class="text-5xl font-bold mt-2 text-emerald-400">${avgCSAT}</p>`;
    document.getElementById('kpi3').innerHTML = `<p class="text-gray-400 text-sm">FCR Promedio</p><p class="text-5xl font-bold mt-2">${avgFCR}%</p>`;
    document.getElementById('kpi4').innerHTML = `<p class="text-gray-400 text-sm">Adherencia</p><p class="text-5xl font-bold mt-2">${avgAdh}%</p>`;
    document.getElementById('kpi5').innerHTML = `<p class="text-gray-400 text-sm">Mejor Asesor</p><p class="text-xl font-semibold mt-2">${topPerformer.name}</p>`;
}

function renderRankingTable(filteredAdvisors) {
    let html = `
        <thead>
            <tr class="bg-gray-800 text-gray-400 text-xs uppercase">
                <th class="text-left p-5">Asesor</th>
                <th class="text-center p-5">Llamadas</th>
                <th class="text-center p-5">CSAT</th>
                <th class="text-center p-5">FCR</th>
                <th class="text-center p-5">Adherencia</th>
                <th class="text-center p-5">Score Total</th>
                <th class="w-12"></th>
            </tr>
        </thead>
        <tbody class="divide-y divide-gray-800">`;

    filteredAdvisors.forEach((advisor, index) => {
        const score = (advisor.csat * 0.4 + advisor.fcr * 0.3 + advisor.adherence * 0.3).toFixed(1);
        html += `
            <tr class="hover:bg-gray-800/50 cursor-pointer" onclick="openAdvisorModal(${index})">
                <td class="p-5 font-medium">${advisor.name}</td>
                <td class="text-center p-5">${advisor.calls.toLocaleString()}</td>
                <td class="text-center p-5 font-semibold text-emerald-400">${advisor.csat}</td>
                <td class="text-center p-5">${advisor.fcr}</td>
                <td class="text-center p-5">${advisor.adherence}</td>
                <td class="text-center p-5 font-bold">${score}</td>
                <td><i class="fas fa-chevron-right text-gray-600"></i></td>
            </tr>`;
    });
    html += `</tbody>`;
    document.getElementById('rankingTable').innerHTML = html;
}

function createAllCharts() {
    // Monthly Evolution
    new Chart(document.getElementById('monthlyChart'), {
        type: 'bar',
        data: { labels: ['Ene','Feb','Mar','Abr'], datasets: [{ label: 'Llamadas', data: monthlyData.calls, backgroundColor: '#6366f1' }] },
        options: { responsive: true, plugins: { legend: { display: false }}}
    });

    // Distribution
    new Chart(document.getElementById('distributionChart'), {
        type: 'doughnut',
        data: {
            labels: ['90-100', '85-89', '80-84', '<80'],
            datasets: [{ data: [8, 5, 2, 0], backgroundColor: ['#10b981', '#3b82f6', '#eab308', '#ef4444'] }]
        }
    });

    // Multi Trend
    new Chart(document.getElementById('trendMultiChart'), {
        type: 'line',
        data: {
            labels: ['Ene','Feb','Mar','Abr'],
            datasets: [
                { label: 'CSAT', data: monthlyData.csat, borderColor: '#10b981', tension: 0.4 },
                { label: 'FCR', data: monthlyData.fcr, borderColor: '#6366f1', tension: 0.4 }
            ]
        }
    });
}

function openAdvisorModal(index) {
    currentAdvisor = advisors[index];
    document.getElementById('modalName').textContent = currentAdvisor.name;
    
    const content = document.getElementById('modalContent');
    content.innerHTML = `
        <div>
            <p class="text-gray-400">Llamadas Atendidas</p>
            <p class="text-4xl font-bold">${currentAdvisor.calls.toLocaleString()}</p>
        </div>
        <div>
            <p class="text-gray-400">Tiempo Promedio</p>
            <p class="text-4xl font-bold">${currentAdvisor.avgTime}s</p>
        </div>
        <div class="col-span-2 mt-4">
            <canvas id="modalRadar" height="140"></canvas>
        </div>
    `;
    document.getElementById('modal').classList.remove('hidden');

    // Radar chart in modal
    setTimeout(() => {
        new Chart(document.getElementById('modalRadar'), {
            type: 'radar',
            data: {
                labels: ['CSAT', 'FCR', 'Adherencia', 'Calidad', 'Resolución'],
                datasets: [{
                    data: [currentAdvisor.csat, currentAdvisor.fcr, currentAdvisor.adherence, currentAdvisor.quality, currentAdvisor.resolution],
                    backgroundColor: 'rgba(99, 102, 241, 0.2)',
                    borderColor: '#6366f1',
                    borderWidth: 3
                }]
            },
            options: { scales: { r: { min: 70, max: 100 }}}
        });
    }, 100);
}

function closeModal() {
    document.getElementById('modal').classList.add('hidden');
}

// ==================== CSV UPLOAD ====================
function handleFileUpload(e) {
    const file = e.target.files[0];
    Papa.parse(file, {
        header: true,
        skipEmptyLines: true,
        complete: function(results) {
            advisors = results.data.map(row => ({
                name: row.Nombre || row.name,
                calls: parseFloat(row.Llamadas || row.calls),
                csat: parseFloat(row.CSAT || row.csat),
                fcr: parseFloat(row.FCR || row.fcr),
                adherence: parseFloat(row.Adherencia || row.adherence),
                quality: parseFloat(row.Calidad || row.quality || 90),
                avgTime: parseFloat(row.Tiempo || 250),
                resolution: parseFloat(row.Resolucion || 90)
            })).filter(a => a.name);
            
            calculateKPIs();
            renderRankingTable(advisors);
            alert(`✅ ${advisors.length} asesores cargados exitosamente!`);
        }
    });
}

function filterTable() {
    const term = document.getElementById('search').value.toLowerCase();
    const filtered = advisors.filter(a => a.name.toLowerCase().includes(term));
    renderRankingTable(filtered);
}

function exportAll() {
    let csv = "Nombre,Llamadas,CSAT,FCR,Adherencia,Calidad\n";
    advisors.forEach(a => {
        csv += `"\( {a.name}", \){a.calls},\( {a.csat}, \){a.fcr},\( {a.adherence}, \){a.quality}\n`;
    });
    const blob = new Blob([csv], {type: 'text/csv'});
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = url;
    link.download = 'KPI_CallCenter_Completo_2026.csv';
    link.click();
}

// Tab navigation
function showTab(n) {
    document.querySelectorAll('.tab').forEach(tab => tab.classList.add('hidden'));
    document.getElementById(`tab${n}`).classList.remove('hidden');
    
    document.querySelectorAll('.tab-btn').forEach((btn, i) => {
        if (i === n) btn.classList.add('bg-indigo-600', 'text-white');
        else btn.classList.remove('bg-indigo-600', 'text-white');
    });

    document.getElementById('pageTitle').textContent = 
        n === 0 ? "Dashboard General" :
        n === 1 ? "Ranking de Asesores" :
        n === 2 ? "Análisis Temporal" : "Perfil de Asesor";
}

// Init
window.onload = () => {
    calculateKPIs();
    renderRankingTable(advisors);
    createAllCharts();
    showTab(0);
};
</script>
</body>
</html>
