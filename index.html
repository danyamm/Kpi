<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Minijuego Planta</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a2e;
      font-family: sans-serif;
    }
    #game {
      background: #16213e;
      border: 3px solid #0f3460;
      border-radius: 12px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <canvas id="game" width="500" height="400"></canvas>
  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    let plantHeight = 20;
    let watering = false;

    function drawPot() {
      ctx.fillStyle = "#8B4513";
      ctx.fillRect(200, 350, 100, 40);
    }

    function drawPlant() {
      ctx.fillStyle = "green";
      ctx.fillRect(245, 350 - plantHeight, 10, plantHeight);
      ctx.beginPath();
      ctx.arc(250, 350 - plantHeight, 15, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawWateringCan() {
      ctx.fillStyle = "#0f3460";
      ctx.fillRect(100, 100, 60, 30);
      ctx.fillRect(160, 110, 30, 10);
      // agua
      ctx.fillStyle = "lightblue";
      for (let i = 0; i < 5; i++) {
        ctx.beginPath();
        ctx.arc(190 + i*10, 140 + i*10, 5, 0, Math.PI*2);
        ctx.fill();
      }
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawPot();
      drawPlant();
      if (watering) {
        drawWateringCan();
      }
    }

    canvas.addEventListener('click', () => {
      watering = true;
      plantHeight += 10; // crece la planta
      draw();
      setTimeout(() => {
        watering = false;
        draw();
      }, 800); // regadera desaparece después de 0.8s
    });

    draw();
  </script>
</body>
</html>
